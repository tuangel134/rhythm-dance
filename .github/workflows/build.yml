name: Build y Release

# Construye la app de escritorio para Windows, Linux y macOS.
# - En cada push a main: compila y sube los binarios como "artifacts"
#   (para descargar desde la pestana Actions).
# - Al crear un tag vX.Y.Z (p.ej. v0.2.0): ademas publica un Release
#   con todos los instaladores adjuntos.

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch: {}   # permite lanzarlo a mano desde la pestana Actions

permissions:
  contents: write          # necesario para crear releases

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win
          - os: ubuntu-latest
            platform: linux
          - os: macos-latest
            platform: mac
    runs-on: ${{ matrix.os }}

    steps:
      - name: Clonar el repositorio
        uses: actions/checkout@v4

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Instalar dependencias
        run: npm ci

      - name: Construir el cliente (Vite)
        run: npm run build:client

      - name: Descargar ffmpeg + yt-dlp para Windows (incluidos en el .exe)
        if: matrix.platform == 'win'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path bin | Out-Null
          # ffmpeg + ffprobe (build estatico de gyan.dev)
          Write-Host "Descargando ffmpeg..."
          Invoke-WebRequest -Uri "https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-essentials.zip" -OutFile ffmpeg.zip
          Expand-Archive -Path ffmpeg.zip -DestinationPath ffmpeg_tmp -Force
          $ff = Get-ChildItem -Path ffmpeg_tmp -Recurse -Filter ffmpeg.exe | Select-Object -First 1
          $fp = Get-ChildItem -Path ffmpeg_tmp -Recurse -Filter ffprobe.exe | Select-Object -First 1
          Copy-Item $ff.FullName -Destination bin\ffmpeg.exe -Force
          Copy-Item $fp.FullName -Destination bin\ffprobe.exe -Force
          # yt-dlp (descargas opcionales de musica)
          Write-Host "Descargando yt-dlp..."
          Invoke-WebRequest -Uri "https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp.exe" -OutFile bin\yt-dlp.exe
          Write-Host "Herramientas en bin/:"
          Get-ChildItem bin

      - name: Empaquetar app (Windows)
        if: matrix.platform == 'win'
        run: npx electron-builder --win nsis portable --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Descargar ffmpeg + yt-dlp para Linux (incluidos en el paquete)
        if: matrix.platform == 'linux'
        run: |
          mkdir -p bin
          echo "Descargando ffmpeg estatico..."
          curl -L -o ffmpeg.tar.xz "https://johnvansickle.com/ffmpeg/releases/ffmpeg-release-amd64-static.tar.xz"
          mkdir -p ffmpeg_tmp && tar -xf ffmpeg.tar.xz -C ffmpeg_tmp --strip-components=1
          cp ffmpeg_tmp/ffmpeg bin/ffmpeg
          cp ffmpeg_tmp/ffprobe bin/ffprobe
          chmod +x bin/ffmpeg bin/ffprobe
          echo "Descargando yt-dlp..."
          curl -L -o bin/yt-dlp "https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp_linux"
          chmod +x bin/yt-dlp
          ls -la bin

      - name: Empaquetar app (Linux)
        if: matrix.platform == 'linux'
        run: npx electron-builder --linux AppImage deb --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Empaquetar app (macOS)
        if: matrix.platform == 'mac'
        run: npx electron-builder --mac dmg --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Subir artifacts (descargables desde Actions)
        uses: actions/upload-artifact@v4
        with:
          name: rhythm-dance-${{ matrix.platform }}
          retention-days: 14
          path: |
            dist-app/*.exe
            dist-app/*.AppImage
            dist-app/*.deb
            dist-app/*.dmg

      - name: Publicar en el Release (solo al crear un tag vX.Y.Z)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist-app/*.exe
            dist-app/*.AppImage
            dist-app/*.deb
            dist-app/*.dmg
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
