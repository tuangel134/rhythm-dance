name: Build APK (Android)

# Construye el APK de la app Android (Kotlin/WebView) en la nube.
# - En push a main: deja el APK como artifact descargable.
# - En tags vX.Y.Z: ademas lo adjunta al Release.

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Clonar el repositorio
        uses: actions/checkout@v4

      - name: Instalar JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Configurar Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Construir APK (debug, instalable directo)
        working-directory: android
        run: |
          chmod +x ./gradlew || true
          gradle wrapper --gradle-version 8.9 || true
          ./gradlew --no-daemon assembleDebug || gradle --no-daemon assembleDebug

      - name: Renombrar APK
        run: |
          mkdir -p out
          find android -name "*.apk" -path "*debug*" -exec cp {} out/RhythmDance.apk \;
          ls -la out

      - name: Subir artifact
        uses: actions/upload-artifact@v4
        with:
          name: rhythm-dance-android
          path: out/RhythmDance.apk
          retention-days: 30

      - name: Publicar en el Release (solo tags vX.Y.Z)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: out/RhythmDance.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
